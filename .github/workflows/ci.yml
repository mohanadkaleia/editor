name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm install` instead of `npm ci`: Vite 8 uses rolldown, which
      # ships platform-specific native bindings as `optionalDependencies`.
      # `npm ci` hits a long-standing npm bug (#4828) where optional
      # deps from a foreign-platform lockfile are skipped — the Linux
      # binding never installs, the build crashes with "Cannot find
      # native binding". `npm install` resolves platform-appropriate
      # optional deps on the fly.
      - run: npm install --no-audit --no-fund

      # Run the package's vitest suite. Any failure blocks the workflow
      # and surfaces in the PR before a bad release can reach npm.
      - run: npm run test -w kurrasah

      # Verify the package build is clean. Catches broken imports,
      # missing exports, and config drift independently of the tests.
      - run: npm run build -w kurrasah

      # Verify the web demo builds cleanly. Catches consumer-side
      # integration regressions (alias resolution, router config, etc.).
      - run: npm run build -w web
