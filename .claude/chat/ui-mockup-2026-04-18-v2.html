<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض محرر نصوص Vue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#ffffff',
                        surface: '#f9fafb',
                        surfaceHover: '#f3f4f6',
                        border: '#e5e7eb',
                        textPrimary: '#111827',
                        textSecondary: '#6b7280',
                        accent: '#111827',
                        accentHover: '#374151',
                    },
                    fontFamily: {
                        sans: ['Cairo', 'Inter', 'ui-sans-serif', 'system-ui'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        .prose-editor blockquote { border-right: 3px solid #3b82f6; padding-right: 1rem; color: #6b7280; font-style: italic; }
        .prose-editor pre { background-color: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; color: #111827; }
        .prose-editor code { color: #f43f5e; background-color: rgba(244, 63, 94, 0.1); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; }
        .prose-editor h1 { font-size: 2.25rem; font-weight: 600; margin-bottom: 1rem; color: #111827; letter-spacing: -0.025em; }
        .prose-editor h2 { font-size: 1.5rem; font-weight: 600; margin-top: 2rem; margin-bottom: 0.75rem; color: #111827; }
        .prose-editor p { margin-bottom: 1.25rem; line-height: 1.75; color: #4b5563; }
        .prose-editor ul { list-style-type: disc; padding-right: 1.5rem; margin-bottom: 1.25rem; color: #4b5563; }
    </style>
</head>
<body>
  <!-- Header: logo + app name + version pill + right-side: GitHub-style primary button -->
  <!-- Editor: centered max-w-3xl with new prose styling. Blue right-border blockquote; red/pink inline code chip. -->
  <!-- Floating toolbar: pill-shaped, light surface, small round buttons, B/I/code/link/H1/H2. -->
</body>
</html>
